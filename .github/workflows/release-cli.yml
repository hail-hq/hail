# Release workflow for the `hail` CLI.
#
# Triggered on `cli-v*` tag pushes. Runs GoReleaser (cli/.goreleaser.yml) to
# build multi-arch tarballs, publish a GitHub Release on hail-hq/hail, and
# push the auto-generated formula to hail-hq/homebrew-tap so
# `brew install hail-hq/tap/hail` works after release.
#
# Required secrets:
#   GITHUB_TOKEN        — auto-provided by Actions; used for the GitHub Release.
#   HOMEBREW_TAP_TOKEN  — fine-grained PAT (or classic with `repo` scope) that
#                         can push commits to hail-hq/homebrew-tap. Set at the
#                         repo or org level under Settings → Secrets → Actions.
name: Release hail CLI

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # publish a GitHub Release on this repo
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history for changelog generation

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      # GoReleaser OSS expects pure semver tags (`v0.1.0`). Our monorepo uses
      # prefixed tags (`cli-v0.1.0`); strip the prefix before passing to
      # GoReleaser via env vars. Previous tag is the most recent `cli-v*` other
      # than the current one — empty on the first CLI release, which disables
      # changelog generation cleanly.
      - name: Compute GoReleaser current/previous tags
        id: tags
        run: |
          current_full="${GITHUB_REF_NAME}"
          current="${current_full#cli-}"
          previous_full=$(git tag --list 'cli-v*' --sort=-version:refname \
            | grep -vx "${current_full}" \
            | head -n1 || true)
          previous="${previous_full#cli-}"
          {
            echo "current=${current}"
            echo "previous=${previous}"
          } >> "$GITHUB_OUTPUT"

      # Manual replacements for the two genuinely-useful checks `--skip=validate`
      # bypasses below: working tree is clean, and the triggering tag points at
      # the same commit as HEAD.
      - name: Assert clean working tree
        run: git diff --exit-code HEAD
      - name: Assert tag points at HEAD
        run: |
          tag_sha=$(git rev-parse "${GITHUB_REF_NAME}^{}")
          head_sha=$(git rev-parse HEAD)
          if [ "${tag_sha}" != "${head_sha}" ]; then
            echo "tag ${GITHUB_REF_NAME} (${tag_sha}) does not point at HEAD (${head_sha})" >&2
            exit 1
          fi

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          # --skip=validate bypasses GoReleaser's check that the
          # GORELEASER_CURRENT_TAG name exists as a git tag pointing at HEAD.
          # Our actual tag (`cli-v<semver>`) does point at HEAD, but GoReleaser
          # has been told the current tag is the stripped `v<semver>` form,
          # which doesn't exist in git. This is the OSS-equivalent of the
          # Pro `monorepo:` feature.
          args: release --clean --skip=validate
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tags.outputs.current }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.tags.outputs.previous }}
