openapi: 3.1.0
info:
  title: Hail
  description:
    "Universal communication platform for AI agents.\n\nThis file is the\
    \ source of truth for the Go CLI. Regenerate it after\nchanging API routes \u2014\
    \ see docs/contributing.md.\n"
  version: 0.1.0
paths:
  /calls:
    post:
      tags:
        - calls
      summary: Create Call
      operationId: create_call_calls_post
      parameters:
        - name: authorization
          in: header
          required: false
          schema:
            anyOf:
              - type: string
              - type: "null"
            title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CallCreate"
      responses:
        "201":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallResponse"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
    get:
      tags:
        - calls
      summary: List Calls
      operationId: list_calls_calls_get
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: "null"
            title: Cursor
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 200
            minimum: 1
            default: 50
            title: Limit
        - name: status
          in: query
          required: false
          schema:
            anyOf:
              - enum:
                  - queued
                  - dialing
                  - ringing
                  - in_progress
                  - completed
                  - failed
                  - busy
                  - no_answer
                  - canceled
                type: string
              - type: "null"
            title: Status
        - name: to
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: "null"
            title: To
        - name: authorization
          in: header
          required: false
          schema:
            anyOf:
              - type: string
              - type: "null"
            title: Authorization
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallListResponse"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /calls/{call_id}:
    get:
      tags:
        - calls
      summary: Get Call
      operationId: get_call_calls__call_id__get
      parameters:
        - name: call_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: Call Id
        - name: authorization
          in: header
          required: false
          schema:
            anyOf:
              - type: string
              - type: "null"
            title: Authorization
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallResponse"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /healthz:
    get:
      summary: Healthz
      operationId: healthz_healthz_get
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Healthz Healthz Get
components:
  schemas:
    CallCreate:
      properties:
        to:
          type: string
          title: To
        from:
          anyOf:
            - type: string
            - type: "null"
          title: From
        system_prompt:
          anyOf:
            - type: string
            - type: "null"
          title: System Prompt
        llm:
          anyOf:
            - $ref: "#/components/schemas/LLMConfig"
            - type: "null"
        first_message:
          anyOf:
            - type: string
            - type: "null"
          title: First Message
        voice_config:
          $ref: "#/components/schemas/VoiceConfig"
        conversation_id:
          anyOf:
            - type: string
              format: uuid
            - type: "null"
          title: Conversation Id
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
      additionalProperties: false
      type: object
      required:
        - to
      title: CallCreate
    CallListResponse:
      properties:
        items:
          items:
            $ref: "#/components/schemas/CallResponse"
          type: array
          title: Items
        next_cursor:
          anyOf:
            - type: string
            - type: "null"
          title: Next Cursor
      type: object
      required:
        - items
      title: CallListResponse
    CallResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        organization_id:
          type: string
          format: uuid
          title: Organization Id
        conversation_id:
          anyOf:
            - type: string
              format: uuid
            - type: "null"
          title: Conversation Id
        from_e164:
          type: string
          title: From E164
        to_e164:
          type: string
          title: To E164
        direction:
          type: string
          enum:
            - outbound
            - inbound
          title: Direction
        status:
          type: string
          enum:
            - queued
            - dialing
            - ringing
            - in_progress
            - completed
            - failed
            - busy
            - no_answer
            - canceled
          title: Status
        end_reason:
          anyOf:
            - type: string
            - type: "null"
          title: End Reason
        provider_call_sid:
          anyOf:
            - type: string
            - type: "null"
          title: Provider Call Sid
        livekit_room:
          anyOf:
            - type: string
            - type: "null"
          title: Livekit Room
        initial_prompt:
          anyOf:
            - type: string
            - type: "null"
          title: Initial Prompt
        recording_s3_key:
          anyOf:
            - type: string
            - type: "null"
          title: Recording S3 Key
        requested_at:
          type: string
          format: date-time
          title: Requested At
        started_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
          title: Started At
        answered_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
          title: Answered At
        ended_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
          title: Ended At
      type: object
      required:
        - id
        - organization_id
        - conversation_id
        - from_e164
        - to_e164
        - direction
        - status
        - end_reason
        - provider_call_sid
        - livekit_room
        - initial_prompt
        - recording_s3_key
        - requested_at
        - started_at
        - answered_at
        - ended_at
      title: CallResponse
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: "#/components/schemas/ValidationError"
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    LLMConfig:
      properties:
        base_url:
          type: string
          title: Base Url
        api_key:
          type: string
          title: Api Key
        model:
          type: string
          title: Model
      additionalProperties: false
      type: object
      required:
        - base_url
        - api_key
        - model
      title: LLMConfig
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
        - loc
        - msg
        - type
      title: ValidationError
    VoiceConfig:
      properties:
        stt:
          type: string
          const: deepgram
          title: Stt
          default: deepgram
        tts:
          type: string
          const: elevenlabs
          title: Tts
          default: elevenlabs
        vad:
          type: string
          const: silero
          title: Vad
          default: silero
        turn_detection:
          type: string
          const: livekit
          title: Turn Detection
          default: livekit
      additionalProperties: false
      type: object
      title: VoiceConfig
